name: Release

# Triggered when a version tag is pushed (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
# Builds the plugin, packages it as a WordPress-style zip, and attaches it to a
# GitHub Release with the same name as the tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package plugin zip
        run: |
          SLUG=gt-table-block
          mkdir -p staging/$SLUG
          cp gt-table-block.php readme.txt staging/$SLUG/
          cp -r build staging/$SLUG/
          if [ -d languages ]; then
            cp -r languages staging/$SLUG/
          fi
          cd staging && zip -r ../$SLUG.zip $SLUG

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            gt-table-block.zip \
          || gh release upload "$GITHUB_REF_NAME" gt-table-block.zip --clobber
